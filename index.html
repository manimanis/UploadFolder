<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envoi de Travaux</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-spinner d-none text-center" aria-hidden="true">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement en cours...</span>
    </div>
    <p class="mt-2" id="loading-text">Préparation de l'envoi...</p>
  </div>

  <main id="app" class="container my-5">
    <h1>Envoi de Travaux</h1>
    <form id="form" method="post" enctype="multipart/form-data" novalidate>
      <!-- Step 0: Type Selection -->
      <fieldset v-if="step >= 0" class="my-2">
        <legend class="h5">Je veux envoyer :</legend>
        <div class="row">
          <div class="col-sm-4 my-1">
            <label>
              <input type="radio" name="type" id="type-dossier" value="dossier"
                v-on:click="onTypeDataClicked('dossier')">
              Un Dossier <img src="assets/images/folder.png" alt="Icône dossier">
            </label>
          </div>
          <div class="col-sm-4 my-1">
            <label>
              <input type="radio" name="type" id="type-fichier" value="fichier"
                v-on:click="onTypeDataClicked('fichier')">
              Un Fichier <img src="assets/images/file.png" alt="Icône fichier">
            </label>
          </div>
          <div class="col-sm-4 my-1">
            <label>
              <input type="radio" name="type" id="type-code" value="code" v-on:click="onTypeDataClicked('code')">
              Un Code <img src="assets/images/python.png" alt="Icône code Python">
            </label>
          </div>
        </div>
      </fieldset>

      <!-- Step 1: File / Code Selection -->
      <fieldset v-if="step >= 1" class="my-2">
        <legend class="h5">Sélectionnez votre travail :</legend>
        <div v-show="typeData == 'dossier'" id="dossier-select" class="my-2">
          <label for="files">Sélectionner un dossier</label>
          <input type="file" name="files[]" id="files" multiple directory webkitdirectory moxdirectory
            class="form-control" v-on:change="onDataChanged('#files')" accept=".zip,.rar,.7z,.tar,.gz">
        </div>
        <div v-show="typeData == 'fichier'" id="fichier-select" class="my-2">
          <label for="fichier">Sélectionner un fichier</label>
          <input type="file" name="fichier" id="fichier" class="form-control" v-on:change="onDataChanged('#fichier')">
        </div>
        <div v-show="typeData == 'code'" id="code-select" class="my-2">
          <label for="code">Copier-coller votre code source</label>
          <textarea id="code" name="code" class="form-control" rows="5" placeholder="Collez votre code ici..."
            v-on:change="onDataChanged('#code')"></textarea>
        </div>
      </fieldset>

      <!-- Step 2: Class -->
      <div v-if="step >= 2" class="my-2">
        <label for="classes">Classe</label>
        <select id="classes" class="form-control" v-model="classe" v-on:change="onClasseChanged()" required>
          <option value="">Sélectionnez votre classe</option>
          <option v-for="cls in nomsClasses" v-bind:value="cls">{{cls}}</option>
          <option value="Autre">Autre</option>
        </select>
      </div>

      <!-- Step 3: Poste -->
      <div v-if="step >= 3" class="my-2">
        <label for="poste">Poste</label>
        <input id="poste" type="text" name="poste" class="form-control" v-model="poste" v-on:change="onPosteChanged()" placeholder="Votre poste" required>
      </div>

      <!-- Step 4: Submit -->
      <div v-if="step >= 4" class="my-2 text-center">
        <input type="submit" value="Envoyer" id="upload-btn" name="upload" class="btn btn-dark"
          v-on:click.prevent="onUploadClicked()" :disabled="uploading" />
      </div>

      <!-- Feedback area with aria-live for accessibility -->
      <div v-if="feedback != ''" class="my-2">
        <div id="feedback" class="badge" v-bind:class="feedbackClass" v-text="feedback" aria-live="polite"></div>
      </div>
    </form>
  </main>
  <script src="assets/js/vue.min.js"></script>
  <script src="assets/js/jszip.min.js"></script>
  <script src="assets/apps/app.js"></script>
</body>

</html>
